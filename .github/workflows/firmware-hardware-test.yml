name: Firmware Hardware Test

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
  pull_request:
    branches: [main]
    paths:
      - "firmware/**"
  workflow_dispatch:
    inputs:
      test_suite:
        description: >
          Test suite to run (maps to firmware/pi-test/test_<name>.sh).
          Examples: "comms" (LoRa bidirectional), "display" (OLED output).
        required: false
        default: "all"
        type: string

jobs:
  hardware-test:
    name: Build, Flash & Test on RPi 4B
    runs-on: [self-hosted, 4b-01-bravo]
    timeout-minutes: 30

    steps:
      - name: Custom Sparse Checkout
        run: |
          echo "Checking out only /firmware..."
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          git init
          git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
          git config core.sparseCheckout true
          echo "firmware/*" > .git/info/sparse-checkout
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout $GITHUB_SHA
          
      - name: Make scripts executable
        working-directory: firmware
        run: chmod +x pi-test/*.sh

      - name: Run hardware-in-the-loop tests
        working-directory: firmware
        env:
          TEST_SUITE: ${{ github.event.inputs.test_suite || 'comms' }}
        run: bash pi-test/run_all.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hardware-test-artifacts
          path: firmware/pi-test/artifacts/
          retention-days: 30
