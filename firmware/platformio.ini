; PlatformIO Project Configuration File for B.R.A.V.O. Firmware
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ── Raspberry Pi Pico W  ───────────────────────────────────────────────────
; Hardware: Pico W (RP2040) + RYLR896 LoRa + GPS NEO-7m + SSD1306 OLED
;   UART0 (GP0/GP1)   -> RYLR896 RXD/TXD
;   I2C0  (GP4/GP5)   -> SSD1306 OLED SDA/SCL
;   UART1 (GP8/GP9)   -> GPS NEO-7m RXD/TXD
;   GP14              -> RYLR896 NRESET
;   GP15              -> GPS PPS (1 Hz timing)
;   VSYS (pins 39-40) -> 5V input (external power)
;   Pin 36 (3V3 OUT)  -> 3.3V for OLED, GPS, LoRa
; ────────────────────────────────────────────────────────────────────────────
[env:rpicow]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino

; Serial Monitor (USB CDC)
monitor_speed = 115200

; Build flags
; Set DEVICE_ADDRESS=1 on the beacon unit, DEVICE_ADDRESS=2 on the relay unit
build_flags =
    -D DEVICE_ADDRESS=1
    -D TARGET_ADDRESS=2

; Library dependencies
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3
    adafruit/Adafruit BusIO@^1.14.1

; Upload options